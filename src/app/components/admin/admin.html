<main class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8">
      <h1 class="text-center mb-4">Panel de Administrador</h1>

      <div class="card p-4" *ngIf="usuario">
        <h4>Bienvenido, {{ usuario.nombre }}!</h4>
        <p><strong>Usuario:</strong> {{ usuario.nombreUsuario }}</p>
        <p><strong>Correo:</strong> {{ usuario.correo }}</p>
        <p><strong>Rol:</strong> {{ usuario.rol }}</p>
      </div>

      <button class="btn btn-danger mt-3 w-100" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>
</main>
