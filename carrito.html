<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludomaniacos - Mi Carrito</title>
    <link

  </head>

    <nav class="navbar navbar-expand-lg bg-light py-3 shadow-sm">

          </li>

          </li>
          <li class="nav-item" id="nav-carrito" style="display: none">

              class="nav-link efecto-agrandar fw-medium text-dark fs-5"

          </li>
          <li class="nav-item" id="nav-admin" style="display: none">

          </li>
          <li class="nav-item" id="nav-cerrar" style="display: none">

          </li>
          <li class="nav-item" id="nav-login" style="display: none">

              class="nav-link efecto-agrandar fw-medium text-dark fs-5"

              >REGISTRARSE</a
