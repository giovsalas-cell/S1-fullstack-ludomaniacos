<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludomaniacos - Mi perfil</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="S1_GiovaniSalas/css/css.css" />
  </head>
  <body>
    <div class="container-fluid p-5 text-white text-center bg-ludoteca">
      <a href="index.html" class="text-decoration-none text-white">
        <h1>LUDOMANIACOS</h1>
        <h5>Tu tienda de juegos de mesa</h5>
      </a>
    </div>

    <main class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <nav class="navbar navbar-expand-lg bg-light py-3 shadow-sm">
            <div class="container-fluid justify-content-center">
              <ul
                class="navbar-nav d-flex flex-column flex-md-row gap-3 gap-md-5 justify-content-center text-center m-0 p-0"
              >
                <li class="nav-item nav-mesa">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="cat-mesa.html"
                    >JUEGOS DE MESA</a
                  >
                </li>
                <li class="nav-item nav-cartas">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="cat-carta.html"
                    >CARTAS</a
                  >
                </li>
                <li class="nav-item nav-rol">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="cat-rol.html"
                    >ROL</a
                  >
                </li>
                <li class="nav-item nav-cooperativo">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="cat-cooperativo.html"
                    >COOPERATIVO</a
                  >
                </li>

                <!-- Sin sesión -->
                <li class="nav-item" id="nav-login" style="display: none">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="login.html"
                    >INICIAR SESIÓN</a
                  >
                </li>
                <li class="nav-item" id="nav-registro" style="display: none">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="formulario.html"
                    >REGISTRARSE</a
                  >
                </li>

                <!-- Con sesión usuario normal -->
                <li class="nav-item" id="nav-perfil" style="display: none">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="perfil.html"
                    >MI PERFIL</a
                  >
                </li>
                <li class="nav-item" id="nav-carrito" style="display: none">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="carrito.html"
                    >MI CARRITO</a
                  >
                </li>

                <!-- Con sesión admin -->
                <li class="nav-item" id="nav-admin" style="display: none">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-dark fs-5"
                    href="admin.html"
                    >PANEL ADMIN</a
                  >
                </li>

                <!-- Con sesión (todos) -->
                <li class="nav-item" id="nav-cerrar" style="display: none">
                  <a
                    class="nav-link efecto-agrandar fw-medium text-danger fs-5"
                    href="#"
                    id="btn-cerrar-sesion"
                    >CERRAR SESIÓN</a
                  >
                </li>
              </ul>
            </div>
          </nav>
          <h2 class="text-center mb-4">Mi perfil</h2>
          <div id="mensajeGeneral"></div>

          <form id="form-perfil">
            <div class="mb-3">
              <label for="nombreUsuario" class="form-label"
                >Nombre de usuario</label
              >
              <input type="text" id="nombreUsuario" class="form-control" />
              <div id="mensaje_nombreUsuario" class="text-danger"></div>
            </div>

            <div class="mb-3">
              <label for="direccion" class="form-label"
                >Dirección de despacho</label
              >
              <input type="text" id="direccion" class="form-control" />
            </div>

            <hr />
            <h5>
              Cambiar contraseña <span class="text-muted fs-6">(opcional)</span>
            </h5>

            <div class="mb-3">
              <label for="nuevaPassword" class="form-label"
                >Nueva contraseña</label
              >
              <input
                type="password"
                id="nuevaPassword"
                class="form-control"
                placeholder="entre 6 y 18 caracteres, mayúscula y número"
              />
              <div id="mensaje_password" class="text-danger"></div>
            </div>

            <div class="mb-3">
              <label for="confirmarPassword" class="form-label"
                >Confirmar contraseña</label
              >
              <input
                type="password"
                id="confirmarPassword"
                class="form-control"
              />
              <div id="mensaje_confirmar" class="text-danger"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Guardar cambios
            </button>
            <a href="index.html" class="btn btn-link w-100 mt-2"
              >Volver al inicio</a
            >
          </form>
        </div>
      </div>
    </main>

    <script src="S1_GiovaniSalas/js/perfil.js"></script>
    <script src="S1_GiovaniSalas/js/navbar.js"></script>
  </body>
</html>
