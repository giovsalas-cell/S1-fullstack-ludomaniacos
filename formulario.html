<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludomaniacos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    
    <link rel="stylesheet" href="S1_GiovaniSalas/css/css.css" />
  </head>
  <body>
    <!--header-->
    <div class="container-fluid p-5 text-white text-center bg-ludoteca">
      <a href="index.html" class="text-decoration-none text-white">
        <h1>LUDOMANIACOS</h1>
        <h5>Tu tienda de juegos de mesa</h5>
      </a>
    </div>

    
     <main class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <h1 class="text-center mb-4">Formulario de registro</h1>
      <div id="mensajeGeneral"></div>

            
            <div id="mensajeGeneral"></div>
            <form id="formularioRegistro" class="col-12 col-md-8 col-lg-6 mx-auto mt-4">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" id="nombre" class="form-control" placeholder="Ej: Cosme Fulanito">
              <div id="mensaje_nombre" class="text-danger"></div>
              <br>
              
              
              
              <label for="nombreUsuario" class="form-label">Nombre de usuario</label>             
              <input type="text" id="nombreUsuario" class="form-control" placeholder="Ej: CosmeFulanito">
              <div id="mensaje_nombreusuario" class="text-danger"></div>
              <br> 
              <label for="email" class="form-label">email</label>             
              <input type="email" id="correoUsuario" class="form-control" placeholder="Ej: ludomaniaco@gmail.com">
              <div id="mensaje_correoUsuario"></div>
              <br>
              <label for="password" class="form-label">Contraseña</label>             
              <input type="password" id="password" class="form-control" placeholder="entre 6 y 18 caracteres, mayuscula y un numero">
              <div id="mensaje_password" class="text-danger"></div>
           <br>
              <label for="passwordRepeat" class="form-label">Repetir Contraseña</label>             
              <input type="password" id="passwordRepeat" class="form-control" >
              <div id="mensaje_passwordRepeat"></div>
           <br>

              <br>
              <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>             
              <input type="date" id="fechaNacimiento" class="form-control" placeholder="05/09/1991">
              <div id="mensaje_fechaNacimiento" class="text-danger"></div>
              <br>
              
              <br>
              <label for="Direccion_despacho" class="form-label">Direccion despacho<span class="text-muted">(opcional)</span></label>             
              <input type="text" id="Direccion_despacho" class="form-control" >
              <div id="mensaje_Direccion_despacho" class="text-danger"></div>
              <br>
              
              <button type="submit" class="btn btn-primary w-100 ">Inscribirme</button>
              <button type="button" class="btn btn-secondary w-100 mt-2" id="btnLimpiar">Limpiar</button>
            </form>
        </div>
  </div>
</main>
      <script src="S1_GiovaniSalas/js/registro.js"></script>
    </nav>
  </body>
</html>
