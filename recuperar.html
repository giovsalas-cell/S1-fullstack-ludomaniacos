<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludomaniacos - Recuperar contraseña</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="S1_GiovaniSalas/css/css.css" />
  </head>
  <body>
    <div class="container-fluid p-5 text-white text-center bg-ludoteca">
      <a href="index.html" class="text-decoration-none text-white">
        <h1>LUDOMANIACOS</h1>
        <h5>Tu tienda de juegos de mesa</h5>
      </a>
    </div>

    <main class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <h2 class="text-center mb-4">Recuperar contraseña</h2>
          <div id="mensajeGeneral"></div>

          <form id="form-recuperar">
            <div class="mb-3">
              <label for="nombreUsuario" class="form-label"
                >Nombre de usuario</label
              >
              <input
                type="text"
                id="nombreUsuario"
                class="form-control"
                placeholder="Tu nombre de usuario"
              />
              <div id="mensaje_usuario" class="text-danger"></div>
            </div>

            <div class="mb-3">
              <label for="correo" class="form-label">Correo electrónico</label>
              <input
                type="email"
                id="correo"
                class="form-control"
                placeholder="Tu correo registrado"
              />
              <div id="mensaje_correo" class="text-danger"></div>
            </div>

            <!-- Este bloque aparece solo si el usuario existe -->
            <div id="bloque-nueva-password" style="display: none">
              <div class="mb-3">
                <label for="nuevaPassword" class="form-label"
                  >Nueva contraseña</label
                >
                <input
                  type="password"
                  id="nuevaPassword"
                  class="form-control"
                  placeholder="entre 6 y 18 caracteres, mayúscula y número"
                />
                <div id="mensaje_nuevaPassword" class="text-danger"></div>
              </div>
              <div class="mb-3">
                <label for="confirmarPassword" class="form-label"
                  >Confirmar contraseña</label
                >
                <input
                  type="password"
                  id="confirmarPassword"
                  class="form-control"
                />
                <div id="mensaje_confirmarPassword" class="text-danger"></div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Verificar
            </button>
            <a href="login.html" class="btn btn-link w-100 mt-2"
              >Volver al login</a
            >
          </form>
        </div>
      </div>
    </main>

    <script src="S1_GiovaniSalas/js/recuperar.js"></script>
  </body>
</html>
