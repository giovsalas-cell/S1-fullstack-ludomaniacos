<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludomaniacos - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="S1_GiovaniSalas/css/css.css" />
  </head>
  <body>
    <!--header-->
    <div class="container-fluid p-5 text-white text-center bg-ludoteca">
      <a href="index.html" class="text-decoration-none text-white">
        <h1>LUDOMANIACOS</h1>
        <h5>Tu tienda de juegos de mesa</h5>
      </a>
    </div>

    <main class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <h2 class="text-center mb-4">Iniciar sesión</h2>
          <div id="mensajeGeneral"></div>

          <form id="form-login">
            <div class="mb-3">
              <label for="nombreUsuario" class="form-label"
                >Nombre de usuario</label
              >
              <input
                type="text"
                id="nombreUsuario"
                class="form-control"
                placeholder="Tu nombre de usuario"
              />
              <div id="mensaje_usuario" class="text-danger"></div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Tu contraseña"
              />
              <div id="mensaje_password" class="text-danger"></div>
            </div>
            <div id="mensaje_validacion" class="text-message"></div>
            <br />
            <button type="submit" class="btn btn-primary w-100">
              Iniciar sesión
            </button>
            <a href="formulario.html" class="btn btn-link w-100 mt-2"
              >No tengo cuenta</a
            >
            <a href="recuperar.html" class="btn btn-link w-100 mt-2"
              >recuperar contraseña</a
            >
          </form>
        </div>
      </div>
    </main>

    <script src="S1_GiovaniSalas/js/login.js"></script>
  </body>
</html>
